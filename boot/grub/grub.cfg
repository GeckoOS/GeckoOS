set timeout=3
set default=0

menuentry "GeckoOS (64-bit)" {
    set gfxmode=1024x768x32
    set gfxpayload=keep
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "GeckoOS (64-bit, serial debug)" {
    set gfxmode=1024x768x32
    set gfxpayload=keep
    multiboot2 /boot/kernel.elf geckoOS.debug=serial
    boot
}